
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Change Password • FRET</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

:root{
    --bg:#0f1117;
    --bg2:#161b27;
    --bg3:#1e2535;
    --border:rgba(255,255,255,.07);
    --accent:#6366f1;
    --accent2:#8b5cf6;
    --text:#f1f5f9;
    --text2:#94a3b8;
    --text3:#64748b;
}

[data-theme="light"]{
    --bg:#f8fafc;
    --bg2:#ffffff;
    --bg3:#f1f5f9;
    --text:#0f172a;
    --text2:#475569;
    --text3:#64748b;
    --border:rgba(0,0,0,.08);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    background:var(--bg);
    color:var(--text);
    font-family:'Inter',sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    position:relative;
}

/* Background */

.bg-grid{
    position:fixed;
    inset:0;

    background-image:
    linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);

    background-size:40px 40px;
}

.bg-glow{
    position:fixed;
    width:500px;
    height:500px;

    background:
    radial-gradient(circle,
    rgba(99,102,241,.12),
    transparent 70%);

    border-radius:50%;

    top:-150px;
    left:-150px;
}

.theme-btn{
    position:fixed;
    top:20px;
    right:20px;

    width:42px;
    height:42px;

    border:none;
    border-radius:12px;

    background:var(--bg3);
    color:var(--text);

    cursor:pointer;
}

.card{
    width:100%;
    max-width:480px;

    background:var(--bg2);

    border:1px solid var(--border);

    border-radius:24px;

    padding:40px;

    position:relative;
    z-index:2;
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo img{
    width:180px;
    height:auto;
}

.title{
    font-family:'Plus Jakarta Sans',sans-serif;
    font-size:1.7rem;
    font-weight:800;
    text-align:center;
}

.subtitle{
    color:var(--text2);
    text-align:center;
    margin-top:10px;
    margin-bottom:30px;
}

.input-group{
    margin-bottom:16px;
}

.input{
    width:100%;
    padding:14px;

    border-radius:12px;

    border:1px solid var(--border);

    background:var(--bg3);

    color:var(--text);
}

.btn{
    width:100%;

    padding:14px;

    border:none;

    border-radius:12px;

    background:
    linear-gradient(
    135deg,
    var(--accent),
    var(--accent2));

    color:white;

    font-weight:700;

    cursor:pointer;

    margin-top:10px;
}

.alert{
    padding:12px;
    margin-bottom:18px;
    border-radius:10px;
    background:rgba(239,68,68,.1);
    color:#fca5a5;
}

</style>
</head>
<body>

<div class="bg-grid"></div>
<div class="bg-glow"></div>

<button class="theme-btn" onclick="toggleTheme()">
    <i class="fas fa-moon" id="themeIcon"></i>
</button>

<div class="card">

    <div class="logo">
        <img src="{{ url_for('static', filename='logo.png') }}">
    </div>

    <div class="title">
        Change Password
    </div>

    <div class="subtitle">
        Create a new password to continue
    </div>

    {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, message in messages %}
        <div class="alert">
            {{ message }}
        </div>
    {% endfor %}
    {% endwith %}

    <form method="POST">

        <div class="input-group">
            <input
                type="password"
                name="new_password"
                class="input"
                placeholder="New Password"
                required>
        </div>

        <div class="input-group">
            <input
                type="password"
                name="confirm_password"
                class="input"
                placeholder="Confirm Password"
                required>
        </div>

        <button class="btn" type="submit">
            Update Password
        </button>

    </form>

</div>

<script>

function toggleTheme(){

    const html =
    document.documentElement;

    const current =
    html.getAttribute('data-theme');

    const next =
    current === 'light'
    ? 'dark'
    : 'light';

    html.setAttribute(
        'data-theme',
        next
    );

    localStorage.setItem(
        'theme',
        next
    );
}

document.documentElement.setAttribute(
    'data-theme',
    localStorage.getItem('theme')
    || 'dark'
);

</script>

</body>
</html>
