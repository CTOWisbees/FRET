services:
  - type: web
    name: fret
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true        # Render generates a strong random value
      - key: DATABASE_URL
        sync: false                # paste your Neon connection string in the dashboard
      - key: FLASK_DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.6"
